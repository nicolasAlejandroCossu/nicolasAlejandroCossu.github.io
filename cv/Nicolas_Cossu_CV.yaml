  sections:
    summary:
      - Self-taught Data Engineer who builds, owns and ships production data systems end to end, from
        ETL pipelines and cloud architecture to the product on top. I turn ambiguous problems into
        systems people trust at scale, and I lead delivery from the first scoping call to production.
        Strong foundation in data science and analytics, with AI as a force multiplier across the stack.
    experience:
      - company: Luno
        position: Semi-Senior Data Engineer
        location: New York, US (Remote)
        start_date: 2025-04
        end_date: present
        highlights:
          - Migrated **70,000+ users** from an undocumented legacy database to a modern system in
            production with **zero disruption**, via custom parsing scripts, fallbacks and automatic
            backups in a single 10+ hour run.
          - Engineered backend platforms architected to hold **100,000+ active users**, owning
            high-volume, high-concurrency APIs and production ETL pipelines.
          - Wrote the winning technical proposal **for a key client**, then designed its cloud
            infrastructure from scratch.
          - Built and maintained REST APIs (FastAPI), relational schemas and full backends on
            Snowflake, Airflow and AWS, with CI/CD, automated backups and migrations.
          - Promoted to Semi-Senior and made permanent; now guide projects and mentor a junior
            teammate within a 20-person multidisciplinary team working under Scrum.
      - company: Exos
        position: Co-Founder & Engineer
        location: Buenos Aires, Argentina
        start_date: 2026-05
        end_date: present
        highlights:
          - Co-founded a software studio delivering validated multi-tenant systems and bespoke
            platforms for Argentine SMBs, owning the full arc from scoping to production.
          - "Owned **CongressIA** end to end, a national-scale platform for medical congresses (three
            connected systems for industries, physicians and organisers): negotiation, roadmap,
            estimation, architecture, backend, infrastructure and full frontend. Two people, three months."
          - Won the CongressIA proposal, then architected its cloud infrastructure from zero
            (Next.js, FastAPI, PostgreSQL, AWS).
          - Building **CapyThemAll**, an ecommerce product with a companion mobile pet game,
            running on the studio's multi-tenant ecosystem.
    education:
      - institution: San Vicente Technical High School
        area: Electronics
        degree: Technician
        location: Buenos Aires, Argentina
        start_date: 2019-03
        end_date: 2025-12
        highlights:
